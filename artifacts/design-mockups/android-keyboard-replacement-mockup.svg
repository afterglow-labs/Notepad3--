    <text x="62" y="246" class="mono" font-size="20" fill="#1f2937">Cursor moves without keyboard.</text>
    <text x="62" y="300" class="mono" font-size="20" fill="#1f2937">Swipe deck for numbers.</text>
    <rect x="16" y="527" width="368" height="34" class="status"/>
    <text x="28" y="550" class="ui" font-size="15" fill="#475569">JSON | 12 lines | 354 chars | Ln 3, Col 48</text>
    <rect x="16" y="561" width="368" height="183" fill="#373737"/>
