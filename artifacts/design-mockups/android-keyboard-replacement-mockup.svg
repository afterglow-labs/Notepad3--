      <rect x="246" width="80" height="40" rx="12" class="dimKey"/><text x="286" y="22" class="keyTextSmall">Pg Up</text>
      <rect x="66" y="48" width="80" height="40" rx="12" class="dimKey"/><text x="106" y="70" class="keyTextSmall">End</text>
