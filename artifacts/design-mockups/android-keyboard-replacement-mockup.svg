      <rect x="332" y="96" width="52" height="88" rx="12" class="railKey"/><text x="358" y="142" class="keyTextSmall">Enter</text>
    </g>
    <rect x="154" y="733" width="92" height="4" rx="3" fill="#9ca3af"/>
